name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.VIVLIO_HF_SYNC_TOKEN }}
        run: git push https://ogwata:$HF_TOKEN@huggingface.co/spaces/ogwata/vivliostyle-chatbot-v3 main
